locale: "en-US"
title: "Shadab Mahboob"
title_separator: "-"
name: &name "Shadab Mahboob"
description: &description "Academic website of Shadab Mahboob, graduate researcher at Virginia Tech working on AI/ML for wireless networking, O-RAN, 5G/6G, and non-terrestrial networks."
url: "https://shadab442.github.io"
baseurl: ""
repository: "Shadab442/Shadab442.github.io"
teaser:
breadcrumbs: false
words_per_minute: 160
future: false
read_more: "disabled"
talkmap_link: false

author:
  name: "Shadab Mahboob"
  avatar: "gc-photo.jpg"
  bio: "Graduate researcher at Virginia Tech (Wireless@VT) applying AI/ML to wireless networking, O-RAN, 5G/6G, and non-terrestrial networks."
  location: "Blacksburg, VA, USA"
  employer:
  googlescholar: "https://scholar.google.com/citations?user=_I9N7RcAAAAJ&hl=en"
  email: "mshadab@vt.edu"
  github: "https://github.com/Shadab442"
  linkedin: "https://www.linkedin.com/in/mahboob-shadab/"
  orcid:

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG.md
  - CONTRIBUTING.md
  - Gemfile
  - LICENSE
  - README.md
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - log
  - markdown_generator
  - node_modules
  - package.json
  - talkmap.ipynb
  - talkmap.py
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: America/New_York

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
